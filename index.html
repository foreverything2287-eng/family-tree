<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Семейное древо Софии</title>

<style>

body{
margin:0;
overflow:hidden;
background:#f8f5f0;
font-family:system-ui;
}

.viewport{
width:100vw;
height:100vh;
overflow:hidden;
}

.tree{

position:absolute;

left:50%;
top:50%;

transform:
translate(-50%,-50%);

display:flex;

flex-direction:column;

align-items:center;

}

/* карточки */

.person{

background:white;

padding:20px 28px;

border-radius:20px;

box-shadow:
0 10px 30px rgba(0,0,0,.08);

position:relative;

cursor:pointer;

transition:.2s;

}

.person:hover{

transform:
translateY(-4px);

}

.name{

font-size:22px;

font-weight:600;

}

/* линия */

.line{

width:2px;

height:120px;

background:#b7aea4;

}

/* всплывашка */

.tooltip{

display:none;

position:absolute;

bottom:120%;

left:50%;

transform:
translateX(-50%);

width:250px;

background:white;

padding:16px;

border-radius:16px;

box-shadow:
0 10px 30px rgba(0,0,0,.18);

}

.person:hover .tooltip{

display:block;

}

</style>

</head>

<body>

<div class="viewport">

<div
class="tree"
id="tree">

<div class="person">

<div class="name">

Екатерина Орновскис

</div>

<div class="tooltip">

род. 16.10.1983

<br>

Эстония

</div>

</div>

<div class="line"></div>

<div class="person">

<div class="name">

София Орновскис

</div>

<div class="tooltip">

род. 18.11.2009

<br>

Эстония

</div>

</div>

</div>

</div>

<script>

const tree =
document.getElementById(
"tree"
);

let x=0;

let y=0;

let scale=1;

let dragging=false;

let startX=0;

let startY=0;

function draw(){

tree.style.transform=

`
translate(
${x}px,
${y}px
)

scale(
${scale}
)
`;

}

document.addEventListener(
"mousedown",
(e)=>{

dragging=true;

startX=
e.clientX;

startY=
e.clientY;

}
);

document.addEventListener(
"mouseup",
()=>{

dragging=false;

}
);

document.addEventListener(
"mousemove",
(e)=>{

if(
!dragging
)return;

x+=
e.clientX-
startX;

y+=
e.clientY-
startY;

startX=
e.clientX;

startY=
e.clientY;

draw();

}
);

document.addEventListener(
"wheel",
(e)=>{

e.preventDefault();

if(
e.deltaY<0
){

scale+=0.1;

}

else{

scale-=0.1;

}

scale=
Math.max(
0.5,
Math.min(
2.5,
scale
)
);

draw();

},
{
passive:false
}
);

draw();

</script>

</body>

</html>
