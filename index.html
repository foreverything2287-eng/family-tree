<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<title>Семейное древо Софии</title>

<style>

body{

margin:0;

background:#f8f5f0;

font-family:system-ui;

}

.tree{

display:flex;

flex-direction:column;

align-items:center;

padding-top:80px;

}

/* карточка */

.person{

background:white;

padding:18px 24px;

border-radius:20px;

box-shadow:
0 10px 30px rgba(0,0,0,.08);

position:relative;

cursor:pointer;

transition:.2s;

}

.person:hover{

transform:translateY(-3px);

}

/* линия */

.line{

width:2px;

height:100px;

background:#b9b2aa;

}

/* всплывашка */

.tooltip{

display:none;

position:absolute;

bottom:120%;

left:50%;

transform:translateX(-50%);

background:white;

padding:16px;

width:240px;

border-radius:16px;

box-shadow:
0 10px 30px rgba(0,0,0,.18);

}

.person:hover .tooltip{

display:block;

}

.name{

font-size:22px;

font-weight:600;

}

</style>

</head>

<body>

<div class="tree">

<div class="person">

<div class="name">

Екатерина Орновскис

</div>

<div class="tooltip">

<b>Екатерина Орновскис</b>

<br><br>

род. 16.10.1983

<br>

Эстония

</div>

</div>

<div class="line"></div>

<div class="person">

<div class="name">

София Орновскис

</div>

<div class="tooltip">

<b>София Орновскис</b>

<br><br>

род. 18.11.2009

<br>

Эстония

</div>

</div>

</div>

</body>

</html>
