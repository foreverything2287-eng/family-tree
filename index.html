<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<title>Семейное древо Софии</title>

<style>

body{
margin:0;
overflow:hidden;
background:#f8f5f0;
font-family:system-ui;
}

/* область просмотра */

.viewport{

width:100vw;
height:100vh;

overflow:hidden;

cursor:grab;

}

/* само дерево */

.tree{

position:absolute;

left:50vw;
top:35vh;

display:flex;

flex-direction:column;

align-items:center;

}

/* карточки */

.person{

background:white;

padding:18px 26px;

border-radius:20px;

box-shadow:
0 10px 30px rgba(0,0,0,.08);

position:relative;

}

.name{

font-size:22px;

font-weight:600;

}

/* линия */

.line{

width:2px;

height:110px;

background:#b9b2aa;

}

/* карточка инфы */

.tooltip{

display:none;

position:absolute;

bottom:120%;

left:50%;

transform:translateX(-50%);

background:white;

padding:16px;

width:230px;

border-radius:16px;

box-shadow:
0 10px 30px rgba(0,0,0,.18);

}

.person:hover .tooltip{

display:block;

}

</style>

</head>

<body>

<div class="viewport">

<div class="tree" id="tree">

<div class="person">

<div class="name">

Екатерина Орновскис

</div>

<div class="tooltip">

<b>Екатерина Орновскис</b>

<br><br>

род. 16.10.1983

<br>

Эстония

</div>

</div>

<div class="line"></div>

<div class="person">

<div class="name">

София Орновскис

</div>

<div class="tooltip">

<b>София Орновскис</b>

<br><br>

род. 18.11.2009

<br>

Эстония

</div>

</div>

</div>

</div>

<script>

const tree =
document.getElementById("tree");

let move=false;

let x=window.innerWidth/2;

let y=window.innerHeight*0.35;

let startX=0;

let startY=0;

document.addEventListener("mousedown",(e)=>{

move=true;

startX=e.clientX-x;

startY=e.clientY-y;

});

document.addEventListener("mouseup",()=>{

move=false;

});

document.addEventListener("mousemove",(e)=>{

if(!move)return;

x=e.clientX-startX;

y=e.clientY-startY;

tree.style.left=x+"px";

tree.style.top=y+"px";

});

</script>

</body>

</html>
