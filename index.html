<!DOCTYPE html>

<html lang="ru">

<head>

<meta charset="UTF-8">

<title>Семейное древо</title>

<style>

body{
margin:0;
background:#f7f4ef;
font-family:system-ui;
overflow:hidden;
}

#tree{

width:3000px;

height:3000px;

position:relative;
}

.person{

position:absolute;

background:white;

padding:16px;

border-radius:18px;

box-shadow:
0 10px 30px rgba(0,0,0,.1);

cursor:pointer;

transition:.2s;
}

.person:hover{

transform:scale(1.03);

}

.tooltip{

display:none;

position:absolute;

top:-120px;

left:50%;

transform:translateX(-50%);

background:white;

padding:12px;

width:240px;

border-radius:14px;

box-shadow:
0 10px 25px rgba(0,0,0,.18);

}

.person:hover .tooltip{

display:block;

}

</style>

</head>

<body>

<div id="tree"></div>

<script src="people.js"></script>

<script>

const tree =
document.getElementById("tree");

people.forEach(person=>{

const card =
document.createElement("div");

card.className=
"person";

card.style.left=
person.x+"px";

card.style.top=
person.y+"px";

card.innerHTML=

`
<div>

${person.name}

<div class="tooltip">

<b>${person.name}</b>

<br><br>

род.
${person.birth}

<br>

${person.country}

</div>

</div>
`;

tree.append(card);

});

</script>

</body>

</html>
